# Production nginx config for highgarden.trade
#
# Source of truth — keep this in sync with /etc/nginx/nginx.conf on the droplet.
# To deploy: scp this file to the droplet, then `sudo nginx -t && sudo systemctl reload nginx`.
#
# TLS/SSL lines marked "managed by Certbot" are written by `certbot --nginx`.
# Do not hand-edit those — re-run certbot if certs change.

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log;
    gzip on;

    # Standard WS upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Root path routing: WebSocket → apps/server, plain HTTP → apps/web
    map $http_upgrade $root_upstream {
        default          http://127.0.0.1:3000;   # Next.js (apps/web)
        websocket        http://127.0.0.1:8080;   # apps/server WS
    }

    server {
        server_name highgarden.trade www.highgarden.trade;

        client_max_body_size 5m;

        # Hedger healthz (admin/internal poking only)
        location = /hedger/healthz {
            proxy_pass http://127.0.0.1:4001/healthz;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Versioned backend API → apps/server
        # Only /api/v1/* belongs to apps/server. Everything else under /api/
        # (NextAuth at /api/auth/*, future Next.js route handlers, etc.)
        # falls through to `location /` and reaches Next.js on port 3000.
        location /api/v1/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Next.js static assets — direct to web, no special handling
        location /_next/ {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_valid 200 60m;
        }

        # Root: WebSocket → apps/server, everything else → apps/web
        location / {
            proxy_pass $root_upstream;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_connect_timeout 30s;
            proxy_buffering off;
        }

        listen 443 ssl; # managed by Certbot
        listen [::]:443 ssl ipv6only=on; # managed by Certbot
        ssl_certificate /etc/letsencrypt/live/highgarden.trade/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/highgarden.trade/privkey.pem; # managed by Certbot
        include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    }

    server {
        if ($host = www.highgarden.trade) {
            return 301 https://$host$request_uri;
        } # managed by Certbot

        if ($host = highgarden.trade) {
            return 301 https://$host$request_uri;
        } # managed by Certbot

        listen 80 default_server;
        listen [::]:80 default_server;
        server_name highgarden.trade www.highgarden.trade;
        return 404; # managed by Certbot
    }
}
