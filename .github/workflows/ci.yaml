# PR + push validation. Runs lint, type-check, and build on apps/packages
# affected by the diff. Tasks fan out per-package inside Turbo, so this stays
# as a single workflow regardless of how many apps the repo has.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_SIGNATURE_KEY }}
  # packages/database/prisma.config.ts eagerly resolves DATABASE_URL via
  # env("DATABASE_URL"). prisma generate never opens a connection, so a
  # well-formed dummy URL satisfies the eager check without exposing real creds.
  DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

jobs:
  validate:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        task: [lint, check-types, build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ matrix.task }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ matrix.task }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure affected base/head
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "TURBO_SCM_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
          else
            echo "TURBO_SCM_BASE=HEAD^1" >> "$GITHUB_ENV"
          fi
          echo "TURBO_SCM_HEAD=HEAD" >> "$GITHUB_ENV"

      - name: Run ${{ matrix.task }} (affected only)
        run: |
          bun x turbo run ${{ matrix.task }} \
            --affected \
            --cache-dir=.turbo \
            --concurrency=100% \
            --output-logs=new-only

  audit:
    name: bun audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun audit --prod || true # advisory; flip to fail once baseline is clean

  # Single required check for branch protection. Add this to the
  # "Require status checks" list instead of each matrix entry, so adding
  # or removing a task here doesn't break merge rules.
  ci-required:
    if: always()
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate status
        run: |
          if [[ "${{ needs.validate.result }}" != "success" ]]; then
            echo "validate failed: ${{ needs.validate.result }}"
            exit 1
          fi
