version: "3.8"
services:
  redis:
    image: redis:7-alpine
    container_name: nocturn-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --notify-keyspace-events Ex
    networks:
      - redis-network

  postgres:
    image: postgres:16
    container_name: solmarket-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: solmarket_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  redis_data:

networks:
  redis-network: