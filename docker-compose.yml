version: "3.8"
services:
  postgres:
    image: postgres:16
    container_name: solmarket-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: solmarket_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: